name: 编译并发布 Droidspaces RootFS

on:
  workflow_dispatch: 
    inputs:
      build_target:
        description: '选择要构建的发行版'
        required: true
        type: choice
        default: 'Debian-13-KDE'
        options:                           
          - 'Debian-13-KDE'  
          - 'all'
      build_KDE:
        description: 'KDE桌面选择(conc-精简 min-最小构造 none-不用KDE)'
        required: true
        type: choice
        default: 'min'
        options:    
          - 'conc'
          - 'min'  
          - 'none' 
      enable_mesa:
        description: '开启 高通骁龙GPU 支持'
        required: true
        type: boolean
        default: false
      enable_binfmt:
        description: '开启 跨架构 支持'
        required: true
        type: boolean
        default: false
      enable_yj:
        description: '开启 容器识别部分硬件和网络 支持'
        required: true
        type: boolean
        default: false
      enable_kfgj:
        description: '开发工具 集成'
        required: true
        type: boolean
        default: false
      enable_zip:
        description: '压缩工具 集成'
        required: true
        type: boolean
        default: false
      enable_docker:
        description: 'docker 集成'
        required: true
        type: boolean
        default: false    
jobs:
  # --------------------------------------------------------
  # 阶段 1: setup (环境准备与变量生成)
  # --------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.find-templates.outputs.templates }}
      build_id: ${{ steps.prep.outputs.build_id }}
      build_date: ${{ steps.prep.outputs.build_date }}
      run_nixos: ${{ steps.find-templates.outputs.run_nixos }}
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 解析用户的构建选择
        id: find-templates
        run: |
          TARGET="${{ github.event.inputs.build_target }}"
          RUN_NIXOS="false"
          
          if [ "$TARGET" = "all" ]; then
            TEMPLATES=$(ls *.Dockerfile | sed 's/\.Dockerfile//' | jq -R -s -c 'split("\n")[:-1]')
            RUN_NIXOS="true"
          elif [ "$TARGET" = "NixOS-All" ]; then
            TEMPLATES="[]"
            RUN_NIXOS="true"
          else
            TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
          fi
          
          echo "templates=$TEMPLATES" >> $GITHUB_OUTPUT
          echo "run_nixos=$RUN_NIXOS" >> $GITHUB_OUTPUT
          echo "最终决定的构建矩阵: $TEMPLATES"
          echo "是否构建 NixOS: $RUN_NIXOS"

      - name: 准备构建元数据
        id: prep
        run: |
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S')
          BUILD_ID="v$(date +'%Y%m%d-%H%M%S')"
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "构建 ID: $BUILD_ID"

  # --------------------------------------------------------
  # 阶段 2: build (常规 Linux 发行版 RootFS 的构建)
  # --------------------------------------------------------
  build:
    needs: setup
    if: ${{ needs.setup.outputs.templates != '[]' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.setup.outputs.templates) }}
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 编译 RootFS (${{ matrix.template }})
        run: |
          chmod +x build_rootfs-native.sh
          ./build_rootfs-native.sh \
            -i "${{ matrix.template }}.Dockerfile" \
            -v "${{ needs.setup.outputs.build_id }}" \
            -K "${{ inputs.build_KDE }}" \
            -a "${{ inputs.enable_binfmt }}" \
            -b "${{ inputs.enable_yj }}" \
            -c "${{ inputs.enable_mesa }}" \
            -d "${{ inputs.enable_kfgj }}" \
            -e "${{ inputs.enable_zip }}" \
            -f "${{ inputs.enable_docker }}" 

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.template }}-rootfs
          path: "*.tar.xz"
          retention-days: 1

  # --------------------------------------------------------
  # 阶段 3: build-nixos (NixOS 系统的专属构建)
  # --------------------------------------------------------
  build-nixos:
    needs: setup 
    if: ${{ needs.setup.outputs.run_nixos == 'true' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: NixOS-Minimal-Systemd-latest-Kernel-5.10-and-up
            attr: nixosDroidspacesTarballs.aarch64-linux.minimal
          - name: NixOS-Minimal-Systemd-v257.9
            attr: nixosDroidspacesTarballs.aarch64-linux.minimal-with-systemd-v257
          - name: NixOS-Minimal-Finix-Experimental
            attr: finixDroidspacesTarballs.aarch64-linux.experimental
    steps:
      - name: 安装 Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: 编译 ${{ matrix.name }} RootFS
        run: |
          nix build github:ravindu644/Droidspaces-OSS#${{ matrix.attr }}

      - name: 打包产物
        run: |
          DATE=$(date +%Y%m%d)
          TARBALL=$(find result/tarball -name "*.tar.xz" | head -1)
          FINAL="${{ matrix.name }}-Droidspaces-rootfs-aarch64-${DATE}-${{ needs.setup.outputs.build_id }}.tar.xz"
          cp "$TARBALL" "$FINAL"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-rootfs
          path: "*.tar.xz"
          retention-days: 1

  # --------------------------------------------------------
  # 阶段 4: release (汇总发布)
  # --------------------------------------------------------
  release:
    needs: [setup, build, build-nixos]
    if: ${{ always() && needs.setup.result == 'success' && needs.build.result != 'failure' && needs.build-nixos.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          pattern: "*-rootfs"
          merge-multiple: true

      - name: 创建统一 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.build_id }}
          name: "Droidspaces RootFS ${{ needs.setup.outputs.build_id }}"
          files: "*.tar.xz"
          body: |
            Droidspaces RootFS 自动构建
            构建时间 : ${{ needs.setup.outputs.build_date }}
            构建目标（用户指定）: ${{ github.event.inputs.build_target }}
            构建 ID: ${{ needs.setup.outputs.build_id }}

            构建选项:
            - 高通骁龙 GPU 支持: ${{ github.event.inputs.enable_mesa }}
            - 跨架构支持: ${{ github.event.inputs.enable_binfmt }}
            - 容器硬件与网络识别支持: ${{ github.event.inputs.enable_yj }}
            - 开发工具集成: ${{ github.event.inputs.enable_kfgj }}
            - 压缩工具集成: ${{ github.event.inputs.enable_zip }}
            - Docker 集成: ${{ github.event.inputs.enable_docker }}
            
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
